services:
  # .NET API
  - type: web
    name: islamic-jobs-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: ohio
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: islamic-jobs-db
          property: connectionString
      - key: DatabaseProvider
        value: PostgreSQL
      - key: Jwt__Key
        value: MolanaApp-Super-Secret-Key-2024-Islamic-Portal
      - key: Jwt__Issuer
        value: MolanaApp
      - key: Jwt__Audience
        value: MolanaAppUsers
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

  # Angular Frontend
  - type: web
    name: islamic-jobs-web
    runtime: static
    buildCommand: cd MolanaApp.Web && npm ci && npm run build -- --configuration=production
    staticPublishPath: MolanaApp.Web/dist/MolanaApp.Web/browser
    region: ohio
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: islamic-jobs-db
    databaseName: islamic_jobs_db
    plan: free
    region: ohio
